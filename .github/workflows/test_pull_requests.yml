name: Action on PR

on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v4
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    - name: Install dependencies
      run: uv sync --python ${{ matrix.python-version }} --extra test
    - name: Lint with ruff
      run: |
        uv run --python ${{ matrix.python-version }} ruff check .

    - name: Check that release process is not broken
      if: matrix.python-version == '3.12'
      run: uv build --python ${{ matrix.python-version }}

    - name: Test with pytest
      env:
        QT_QPA_PLATFORM: offscreen
      run: uv run --python ${{ matrix.python-version }} pytest --cov=./ --cov-report=xml
